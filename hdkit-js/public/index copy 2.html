function renderPyramid(signals){

  const pyramid = document.createElement("div");
  pyramid.style.textAlign = "center";
  pyramid.style.fontFamily = "monospace";
  pyramid.style.marginTop = "10px";

  const levels = {
    0: [],
    1: [],
    2: []
  };

  signals.forEach(s => {
    levels[s.level].push(s.type);
  });

  function makeRow(items, width){
    if(!items.length) return "";
    const text = items.join("  ");
    const pad = " ".repeat(Math.max(0, (width - text.length)/2));
    return pad + text;
  }

  const width = 40;

  let html = "";

  html += `<div>`;

  // TOP (dominant)
  html += `<pre>🔺 ${makeRow(levels[1], width)}</pre>`;

  // MIDDLE
  html += `<pre>   ${makeRow(levels[2], width)}</pre>`;

  // BASE (instability warning)
  html += `<pre>🔻 ${makeRow(levels[0], width)}</pre>`;

  html += `</div>`;

  pyramid.innerHTML = html;

  return pyramid;
}

let ranges = {};

function formatGoogleAI(text, maxSentences=1){
  try{
    if(!text) return '';
    const s = String(text).replace(/\s+/g,' ').trim();
    const parts = s.split(/(?<=[.!?])\s+/);
    return parts.slice(0,maxSentences).join(' ');
  }catch(e){ return String(text).slice(0,120); }
}

function norm(v,f){
  try {
    if (!ranges || !ranges[f]) {
      // ranges not loaded yet — return neutral 0.5
      return 0.5;
    }
    const {min=0,max=0}=ranges[f]||{};
    const num = Number(v);
    if (!isFinite(num)) return 0.5;
    if (max === min) return 0.5;
    return (num - min) / (max - min);
  } catch (err) {
    console.warn('norm error', err);
    return 0.5;
  }
}

/* METRIC */
function createMetric(val,key,icon,label,desc){
  // meditative metric is binary: 100% when true, otherwise 0%
  let p;
  if (key === 'meditate'){
    const truth = (val === true) || (String(val).toLowerCase() === 'true') || Number(val) === 1;
    p = truth ? 1 : 0;
  } else {
    p = norm(val,key);
  }

  let iconClass="";
  if(key==="fire") iconClass="fire-icon";
  if(key==="peace") iconClass="peace-icon";
  if(key==="growth") iconClass="growth-icon";
  if(key==="avg") iconClass="balance-icon";

  if(key==="meditate") iconClass="meditate-icon";

  const div=document.createElement("div");
  div.className="metric";
  div.title=desc;

  div.innerHTML=`
    <div class="icon ${iconClass}">${icon}</div>
    <div class="icon-box">
      <div class="fill ${key}" style="height:${p*100}%"></div>
    </div>
    <div class="value">${(p*100).toFixed(0)}%</div>
    <div class="label">${label}</div>
  `;

  // draw zero baseline for metrics that can span negative-to-positive values
  try{
    const boxEl = div.querySelector('.icon-box');
    if (boxEl && ranges && ranges[key]){
      const { min=0, max=0 } = ranges[key] || {};
      if (isFinite(min) && isFinite(max) && max > min){
        const zeroPos = (0 - min) / (max - min); // 0..1 normalized from bottom
        if (zeroPos > 0 && zeroPos < 1){
          const baseline = document.createElement('div');
          baseline.className = 'baseline';
          baseline.style.position = 'absolute';
          baseline.style.left = '0';
          baseline.style.right = '0';
          baseline.style.height = '3px';
          baseline.style.background = 'rgba(220,38,38,0.9)';
          baseline.style.bottom = `${zeroPos * 100}%`;
          baseline.style.zIndex = '3';
          boxEl.appendChild(baseline);
        }
      }
    }
  }catch(e){ /* ignore */ }

  // draw stability threshold lines for values 6,7,8 (show where 'ok' region sits)
  try{
    const boxEl2 = div.querySelector('.icon-box');
    if (key === 'stability' && boxEl2){
      let { min=0, max=9 } = (ranges && ranges[key]) || {};
      // fallback to 0..9 if ranges are missing or invalid
      if (!isFinite(min) || !isFinite(max) || max === min){ min = 0; max = 9; }
      [6,7,8].forEach(v=>{
        const pos = (v - min) / (max - min);
        if (pos > 0 && pos < 1){
          const line = document.createElement('div');
          line.className = 'threshold-line';
          line.style.bottom = `${pos * 100}%`;
          boxEl2.appendChild(line);

          const label = document.createElement('div');
          label.className = 'threshold-label';
          label.style.bottom = `${pos * 100}%`;
          const pct = Math.round(pos * 100);
          // show percentage number but without the '%' symbol as requested
          //label.textContent = `${v} (${pct})`;
          boxEl2.appendChild(label);
        }
      });
    }
  }
  catch(e){ /* ignore */ }

  // add a single red middle line for diversity to indicate midpoint
  try{
    if (key === 'diversity'){
      const boxEl3 = div.querySelector('.icon-box');
      if (boxEl3){
        const midPos = 0.5;
        const dline = document.createElement('div');
        dline.className = 'threshold-line';
        dline.style.bottom = `${midPos * 100}%`;
        boxEl3.appendChild(dline);
  const dlabel = document.createElement('div');
  dlabel.className = 'threshold-label';
  dlabel.style.bottom = `${midPos * 100}%`;
  //dlabel.textContent = 'mid (50)';
        boxEl3.appendChild(dlabel);
      }
    }
  }catch(e){ /* ignore */ }

  return div;
}

function getRelationshipType(fire, peace, growth, stability){

  const signals = [];

  // 🔥 top emotional drivers
  if (fire > 7 && peace < 4) signals.push({type:"🔥 Intense", level:1});
  if (fire > 6 && peace > 6) signals.push({type:"⚡ Powerful", level:1});
  if (peace > 7 && fire < 4) signals.push({type:"🌿 Calm", level:1});

  // 🌱 secondary evolution layer
  if (growth > 7) signals.push({type:"🌱 Growth", level:2});

  // 🌪 structural condition
  if (stability < 3) signals.push({type:"🌪 Volatile", level:0});

  // ⚖️ fallback base state
  if (signals.length === 0) {
    signals.push({type:"⚖️ Balanced", level:2});
  }

  return signals;
}

function renderEnergyStack(signals){

  const container = document.createElement("div");
  container.className = "energy-stack";

  const levels = { 0: [], 1: [], 2: [] };
  signals.forEach(s => levels[s.level].push(s));

  const createLayer = (items, label, className) => {
    const layer = document.createElement("div");
    layer.className = `energy-layer ${className}`;

    const title = document.createElement("div");
    title.className = "energy-label";
    title.textContent = label;

    const row = document.createElement("div");
    row.className = "energy-row";

    items.forEach((s, i) => {
      const pill = document.createElement("div");
      pill.className = "energy-pill";
      pill.textContent = s.type;

      pill.title = signalMeaning[s.type] || "No description available";
      pill.setAttribute(
        "data-tip",
        signalMeaning[s.type] || "No description available"
      );
      // dominant pulse
      if(i === 0 && s.weight >= 3){
        pill.classList.add("dominant");
      }

      row.appendChild(pill);
    });

    layer.appendChild(title);
    layer.appendChild(row);
    return layer;
  };

  container.appendChild(createLayer(levels[1], "▲ DOMINANT", "top"));
  container.appendChild(createLayer(levels[2], "◆ DYNAMICS", "mid"));
  container.appendChild(createLayer(levels[0], "▼ FOUNDATION", "base"));

  // cinematic entrance
  setTimeout(() => {
    container.classList.add("show");
  }, 50);

  return container;
}

function normalizeSignals(signals){

  const has = (t) => signals.some(s => s.type === t);

  if (!has("🔥 Intense") && !has("⚡ Powerful") && !has("🌿 Calm")){
    signals.push({type:"🌀 Ambient Flow", level:1, weight:1});
  }

  if (!has("🌱 Growth")){
    signals.push({type:"🌱 Latent Growth", level:2, weight:1});
  }

  if (!has("🌪 Volatile") && !has("⚖️ Balanced")) {
    signals.push({ type: "⚖️ Stable Foundation", level: 0, weight: 1 });
  }

  return signals;
}
function analyzeRelationship(fire, peace, growth, stability){

  let signals = [];

  if (fire > 7 && peace < 4) signals.push({type:"🔥 Intense", level:1, weight:3});
  if (fire > 6 && peace > 6) signals.push({type:"⚡ Powerful", level:1, weight:3});

  if (growth > 7) signals.push({type:"🌱 Growth", level:2, weight:2});
  else signals.push({type:"🌱 Latent Growth", level:2, weight:1});

  if (stability < 5) signals.push({type:"🌪 Volatile", level:0, weight:4});
  else signals.push({type:"⚖️ Stable Foundation", level:0, weight:2});

  signals = normalizeSignals(signals);

  const dominant = signals.reduce((max, s) =>
    s.weight > max.weight ? s : max
  );

  return {
    signals,
    dominant,
    pyramid: renderEnergyStack(signals)
  };
}
