<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Human Design Relationship Analysis</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
/* =========================
   🍎 APPLE GLASS UI BASE
========================= */

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
  margin: 0;
  padding: 40px;
  background: radial-gradient(circle at top, #dbeafe, #eef2ff, #f8fafc);
  color: #111827;
}

body::before {
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 30% 20%, rgba(99,102,241,0.25), transparent 60%),
    radial-gradient(circle at 70% 80%, rgba(59,130,246,0.18), transparent 60%);
  filter: blur(40px);
  z-index:-1;
}

form.hd-form {
  max-width: 980px;
  margin: 0 auto;
  background: rgba(255,255,255,0.65);
  backdrop-filter: blur(20px);
  border-radius: 24px;
  padding: 22px;
  border: 1px solid rgba(255,255,255,0.4);
  box-shadow: 0 20px 50px rgba(0,0,0,0.08);
}

.form-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 18px;
}

.grid-2 {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.card {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(14px);
  border-radius: 18px;
  padding: 16px;
  border: 1px solid rgba(0,0,0,0.05);
}

.row {
  display:flex;
  gap:8px;
  margin-top:6px;
}

.grid-3 {
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap: 25px;
  margin-top:10px;
}

input {
  width:100%;
  padding:10px;
  border-radius:12px;
  border:1px solid rgba(0,0,0,0.08);
  background: rgba(255,255,255,0.8);
  outline:none;
  box-sizing: border-box;
}

input:focus {
  border-color:#6366f1;
  box-shadow:0 0 0 3px rgba(99,102,241,0.15);
}

button {
  padding:10px 14px;
  border-radius:12px;
  border:none;
  background: linear-gradient(135deg,#6366f1,#3b82f6);
  color:white;
  font-weight:600;
  cursor:pointer;
  -webkit-tap-highlight-color: transparent;
}

button:hover {
  transform: translateY(-1px);
}

.analyze-btn {
  width:100%;
  margin-top:18px;
  padding:14px;
  font-size:16px;
  border-radius:16px;
  background: linear-gradient(135deg,#4f46e5,#2563eb);
}

.summary {
  display:none;
  margin-top:15px;
  padding:12px;
  background:rgba(255,255,255,0.7);
  border-radius:10px;
}

.summary.open {
  display: block;
}

.summary-toggle {
  margin-top:10px;
  padding: 8px;
  cursor:pointer;
  color:#4f46e5;
  font-weight:600;
  text-align: center;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.visual-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:20px;
  margin-top:30px;
  min-height: 200px;
  overflow: visible;
}

.metric {
  background:white;
  border-radius:16px;
  padding:15px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.icon-box {
  position:relative;
  width:60px;
  height:120px;
  margin:10px auto;
  background:#e5e7eb;
  border-radius:30px;
  overflow:hidden;
}

.fill {
  position: absolute;
  bottom: 0;
  width: 100%;
}

.fire { background:linear-gradient(#ffd633,#ff9900); }
.peace { background:linear-gradient(#66cc66,#2f855a); }
.growth { background:linear-gradient(#999,#555); }
.stability { background:linear-gradient(#cc9966,#8b5a2b); }
.diversity { background:linear-gradient(#ff4d4d,#b91c1c); }
.meditate { background:linear-gradient(#7fb3ff,#2b6cb0); }

.icon { font-size:26px; }

.vs-box{
  text-align:center;
  font-weight:800;
  margin:10px 0;
  color:#4f46e5;
}

.live-preview {
  max-width: 900px;
  margin: 20px auto;
  padding: 20px;
  text-align: center;
  font-size: 18px;
  font-weight: 500;
  line-height: 1.6;
  color: #111827;
  min-height: 80px;
}

#aiText {
  transition: opacity 0.6s ease;
}

.fade-out {
  opacity: 0;
}

.fade-in {
  opacity: 1;
}

.energy-stack {
  margin: 20px 0;
  font-family: -apple-system, system-ui;
}

.energy-layer {
  margin: 10px 0;
  padding: 10px;
  border-radius: 14px;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(0,0,0,0.05);
  position: relative;
  overflow: visible;
}

.energy-label {
  font-size: 11px;
  letter-spacing: 1px;
  opacity: 0.6;
  margin-bottom: 6px;
  text-transform: uppercase;
}

.energy-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.energy-pill {
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 13px;
  background: rgba(99,102,241,0.1);
  border: 1px solid rgba(99,102,241,0.2);
  transition: all 0.3s ease;
  position: relative;
  z-index: 1;
}

.energy-pill.dominant {
  background: linear-gradient(135deg,#6366f1,#3b82f6);
  color: white;
  box-shadow: 0 0 12px rgba(99,102,241,0.6);
}

.energy-pill::after {
  content: attr(data-tip);
  position: absolute;
  bottom: 120%;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(15, 23, 42, 0.95);
  color: white;
  padding: 8px 10px;
  font-size: 11px;
  border-radius: 8px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: 0.2s ease;
  z-index: 9999;
}

.energy-pill:hover::after {
  opacity: 1;
}

.scroll-anchor {
  display: block;
  height: 1px;
  margin: 0;
  padding: 0;
  visibility: hidden;
  position: relative;
  top: -80px;
}

@media (max-width: 768px) {
  body {
    padding: 20px;
  }

  .grid-3 {
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .visual-grid {
    grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    gap: 15px;
  }

  .live-preview {
    font-size: 16px;
    padding: 15px;
  }

  form.hd-form {
    padding: 16px;
  }
  
  .scroll-anchor {
    top: -60px;
  }
}

</style>
</head>

<body>

<h1 style="text-align:center;font-weight:800;">Human Design Relationship Analysis</h1>

<form id="calcForm" class="hd-form">

<div class="vs-box">Description</div>

<div class="live-preview" id="livePreview">
  <div id="aiText"></div>
</div>

<div class="form-title">🌍 Inputs</div>

<div class="grid-2">

  <div class="card">
    <div style="font-weight:700; margin-bottom:6px;">Person 1</div>

    <div class="row">
      <input type="text" id="city1" placeholder="Enter city...">
      <button type="button" id="fillCoords1">Fill</button>
    </div>

    <div class="grid-3">
      <input type="number" name="lat1" step="any" value="46.4459152" placeholder="Latitude">
      <input type="number" name="lon1" step="any" value="14.0663103" placeholder="Longitude">
    </div>
    <input type="datetime-local" name="dt1" value="1993-04-24T12:30">
  </div>

  <div class="card">
    <div style="font-weight:700; margin-bottom:6px;">Person 2</div>

    <div class="row">
      <input type="text" id="city2" placeholder="Enter city...">
      <button type="button" id="fillCoords2">Fill</button>
    </div>

    <div class="grid-3">
      <input type="number" name="lat2" step="any" value="46.6624644" placeholder="Latitude">
      <input type="number" name="lon2" step="any" value="16.1655256" placeholder="Longitude">
    </div>
    <input type="datetime-local" name="dt2" value="1989-06-04T14:10">
  </div>

</div>

<button class="analyze-btn" type="submit">Analyze Relationship</button>

<div id="statusLine" style="
  text-align:center;
  margin-top:10px;
  font-weight:600;
  font-family: monospace;
  color:#4f46e5;
  min-height:20px;
"></div>

<span id="metricsAnchor" class="scroll-anchor"></span>

<div class="summary-toggle" id="toggleMetrics">▼ Energy Metrics</div>

<div class="summary" id="metricsPanel">
  <div class="visual-grid" id="visuals"></div>
</div>

<span id="insightsAnchor" class="scroll-anchor"></span>

<div class="summary-toggle" id="toggleSummary">▼ Insights</div>
<div class="summary" id="summary"></div>

</form>

<script>

const statusLine = document.getElementById("statusLine");
const metricsPanel = document.getElementById("metricsPanel");
const toggleMetrics = document.getElementById("toggleMetrics");
const summary = document.getElementById("summary");
const toggleSummary = document.getElementById("toggleSummary");
const visuals = document.getElementById("visuals");
const metricsAnchor = document.getElementById("metricsAnchor");
const insightsAnchor = document.getElementById("insightsAnchor");

let statusInterval = null;
let ranges = {};
const googleAIMode = true;

function smoothScrollTo(element) {
  if (!element) return;
  
  element.offsetHeight;
  
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const y = element.getBoundingClientRect().top + window.pageYOffset - 80;
      
      try {
        window.scrollTo({
          top: y,
          behavior: 'smooth'
        });
      } catch (e) {
        window.scrollTo(0, y);
      }
    });
  });
}

function scrollToMetrics() {
  smoothScrollTo(metricsAnchor);
}

function scrollToInsights() {
  smoothScrollTo(insightsAnchor);
}

function finalizeAnalysisUI() {
  visuals.style.display = "grid";
  visuals.style.opacity = "1";
  visuals.style.visibility = "visible";
  
  metricsPanel.classList.add("open");
  metricsPanel.style.display = "block";
  toggleMetrics.textContent = "▲ Energy Metrics";

  summary.classList.remove("open");
  summary.style.display = "none";
  toggleSummary.textContent = "▼ Insights";

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      scrollToMetrics();
    });
  });
}

toggleMetrics.onclick = (e) => {
  e.preventDefault();
  const isOpen = metricsPanel.classList.contains("open");

  if (isOpen) {
    metricsPanel.classList.remove("open");
    metricsPanel.style.display = "none";
    toggleMetrics.textContent = "▼ Energy Metrics";
  } else {
    metricsPanel.classList.add("open");
    metricsPanel.style.display = "block";
    toggleMetrics.textContent = "▲ Energy Metrics";
    scrollToMetrics();
  }
};

toggleSummary.onclick = (e) => {
  e.preventDefault();
  const isOpen = summary.classList.contains("open");

  if (isOpen) {
    summary.classList.remove("open");
    summary.style.display = "none";
    toggleSummary.textContent = "▼ Insights";
  } else {
    summary.classList.add("open");
    summary.style.display = "block";
    toggleSummary.textContent = "▲ Insights";
    scrollToInsights();
  }
};

function startStatusAnimation() {
  const states = ["Analyzing relationship dynamics..."];
  let i = 0;

  statusInterval = setInterval(() => {
    statusLine.textContent = states[i % states.length];
    i++;
  }, 1000);
}

function stopStatusAnimation(finalText = "Complete.") {
  clearInterval(statusInterval);
  statusLine.textContent = finalText;

  setTimeout(() => {
    statusLine.textContent = "";
  }, 1500);
}

const texts = [
  "Relationship Intelligence, Refined. A new way to see how two individuals connect, align, and evolve.",
  "An interactive web dashboard that takes two people's birth/location inputs, sends them to a backend, and visualizes their relationship dynamics using Human Design–style metrics like Fire (attraction), Peace (harmony), Stability, and Diversity.",
  "A higher standard of compatibility. Precision meets elegance in a system designed to reveal deeper relational dynamics.",
  "Where energies meet. Hidden patterns between two people become visible—attraction, harmony, tension, and growth.",
  "A precision-built analytical system translating birth data into measurable relationship dynamics through structured energy metrics.",
  "Two energies meet. Patterns emerge. This interface reveals the unseen architecture of connection, harmony, and transformation.",
  "Minimal. Intelligent. Effortless. Enter two lives — and watch clarity unfold in a single, elegant interaction."
];

let textIndex = 0;
let charIndex = 0;
let currentText = "";
const typingSpeed = 25;
const delayBetween = 2500;

const aiTextEl = document.getElementById("aiText");

function typeEffect() {
  if (charIndex < texts[textIndex].length) {
    currentText += texts[textIndex].charAt(charIndex);
    aiTextEl.textContent = currentText;
    charIndex++;
    setTimeout(typeEffect, typingSpeed);
  } else {
    setTimeout(() => {
      fadeOut();
    }, delayBetween);
  }
}

function fadeOut() {
  aiTextEl.classList.add("fade-out");
  setTimeout(() => {
    textIndex = (textIndex + 1) % texts.length;
    charIndex = 0;
    currentText = "";
    aiTextEl.textContent = "";
    aiTextEl.classList.remove("fade-out");
    aiTextEl.classList.add("fade-in");
    typeEffect();
  }, 600);
}

typeEffect();

async function loadRanges() {
  try {
    const res = await fetch("/2025-11-15T14-19-25-534Z-pair-time.json");
    const json = await res.json();
    const data = (json.scores || []).map(e => e.score || {});
    ["fire", "peace", "growth", "stability", "diversity"].forEach(f => {
      const vals = data.map(x => Number(x[f]) || 0);
      ranges[f] = { min: Math.min(...vals), max: Math.max(...vals) };
    });
  } catch {
    ["fire", "peace", "growth", "stability", "diversity"].forEach(f => {
      ranges[f] = { min: 0, max: 10 };
    });
  }
}

function norm(v, f) {
  try {
    if (!ranges || !ranges[f]) return 0.5;
    const { min = 0, max = 0 } = ranges[f] || {};
    const num = Number(v);
    if (!isFinite(num)) return 0.5;
    if (max === min) return 0.5;
    return (num - min) / (max - min);
  } catch (err) {
    return 0.5;
  }
}

async function getCoords(city) {
  const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city)}`);
  const d = await res.json();
  if (d[0]) return { lat: d[0].lat, lon: d[0].lon };
}

fillCoords1.onclick = async () => {
  const c = await getCoords(city1.value);
  if (c) {
    document.querySelector('[name=lat1]').value = c.lat;
    document.querySelector('[name=lon1]').value = c.lon;
  }
};

fillCoords2.onclick = async () => {
  const c = await getCoords(city2.value);
  if (c) {
    document.querySelector('[name=lat2]').value = c.lat;
    document.querySelector('[name=lon2]').value = c.lon;
  }
};

function createMetric(val, key, icon, label, desc) {
  let p;
  if (key === 'meditate') {
    const truth = (val === true) || (String(val).toLowerCase() === 'true') || Number(val) === 1;
    p = truth ? 1 : 0;
  } else {
    p = norm(val, key);
  }

  const div = document.createElement("div");
  div.className = "metric";
  div.title = desc;

  div.innerHTML = `
    <div class="icon">${icon}</div>
    <div class="icon-box">
      <div class="fill ${key}" style="height:${p * 100}%"></div>
    </div>
    <div class="value">${(p * 100).toFixed(0)}%</div>
    <div class="label">${label}</div>
  `;

  return div;
}

const signalMeaning = {
  "🔥 Intense": "High attraction pressure. Fast emotional ignition, low stability tolerance.",
  "⚡ Powerful": "Mutual amplification. Both energies reinforce each other strongly.",
  "🌿 Calm": "Low friction interaction. Stable emotional exchange with minimal volatility.",
  "🌱 Growth": "Active development phase. Relationship expands through shared evolution.",
  "🌱 Latent Growth": "Potential for growth exists but is not currently activated.",
  "🌪 Volatile": "Unstable structural base. Emotional or energetic unpredictability present.",
  "⚖️ Stable Foundation": "Grounded structure. Supports consistency and long-term balance.",
  "🌀 Ambient Flow": "Neutral background energy. No dominant emotional driver active.",
  "⚖️ Balanced": "Equilibrium state. No strong polarity between forces."
};

function normalizeSignals(signals) {
  const has = (t) => signals.some(s => s.type === t);

  if (!has("🔥 Intense") && !has("⚡ Powerful") && !has("🌿 Calm")) {
    signals.push({ type: "🌀 Ambient Flow", level: 1, weight: 1 });
  }

  if (!has("🌱 Growth")) {
    signals.push({ type: "🌱 Latent Growth", level: 2, weight: 1 });
  }

  if (!has("🌪 Volatile") && !has("⚖️ Balanced")) {
    signals.push({ type: "⚖️ Stable Foundation", level: 0, weight: 1 });
  }

  return signals;
}

function renderEnergyStack(signals) {
  const container = document.createElement("div");
  container.className = "energy-stack";

  const levels = { 0: [], 1: [], 2: [] };
  signals.forEach(s => levels[s.level].push(s));

  const createLayer = (items, label, className) => {
    const layer = document.createElement("div");
    layer.className = `energy-layer ${className}`;

    const title = document.createElement("div");
    title.className = "energy-label";
    title.textContent = label;

    const row = document.createElement("div");
    row.className = "energy-row";

    items.forEach((s, i) => {
      const pill = document.createElement("div");
      pill.className = "energy-pill";
      pill.textContent = s.type;

      pill.title = signalMeaning[s.type] || "No description available";
      pill.setAttribute("data-tip", signalMeaning[s.type] || "No description available");

      if (i === 0 && s.weight >= 3) {
        pill.classList.add("dominant");
      }

      row.appendChild(pill);
    });

    layer.appendChild(title);
    layer.appendChild(row);
    return layer;
  };

  container.appendChild(createLayer(levels[1], "▲ DOMINANT", "top"));
  container.appendChild(createLayer(levels[2], "◆ DYNAMICS", "mid"));
  container.appendChild(createLayer(levels[0], "▼ FOUNDATION", "base"));

  return container;
}

function analyzeRelationship(fire, peace, growth, stability) {
  let signals = [];

  if (fire > 7 && peace < 4) signals.push({ type: "🔥 Intense", level: 1, weight: 3 });
  if (fire > 6 && peace > 6) signals.push({ type: "⚡ Powerful", level: 1, weight: 3 });
  if (peace > 7 && fire < 4) signals.push({ type: "🌿 Calm", level: 1, weight: 3 });

  if (growth > 7) signals.push({ type: "🌱 Growth", level: 2, weight: 2 });
  else signals.push({ type: "🌱 Latent Growth", level: 2, weight: 1 });

  if (stability < 5) signals.push({ type: "🌪 Volatile", level: 0, weight: 4 });
  else signals.push({ type: "⚖️ Stable Foundation", level: 0, weight: 2 });

  signals = normalizeSignals(signals);

  const dominant = signals.reduce((max, s) =>
    s.weight > max.weight ? s : max
  );

  return {
    signals,
    dominant,
    pyramid: renderEnergyStack(signals)
  };
}

function formatGoogleAI(text, maxSentences = 1) {
  try {
    if (!text) return '';
    const s = String(text).replace(/\s+/g, ' ').trim();
    const parts = s.split(/(?<=[.!?])\s+/);
    return parts.slice(0, maxSentences).join(' ');
  } catch (e) {
    return String(text).slice(0, 120);
  }
}

calcForm.addEventListener("submit", async e => {
  e.preventDefault();

  startStatusAnimation();
  const obj = Object.fromEntries(new FormData(e.target).entries());

  const res = await fetch("/run", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": "my-secret-key" },
    body: JSON.stringify(obj)
  });

  const hd = await res.json();
  stopStatusAnimation("Complete.");
  const d = hd.data || hd;

  const box = visuals;
  box.innerHTML = "";

  const fire = d.fireScore;
  const peace = d.peaceScore;

  box.appendChild(createMetric(fire, "fire", "🔥", "Fire", "Attraction"));
  box.appendChild(createMetric(peace, "peace", "🍵", "Peace", "Harmony"));
  box.appendChild(createMetric(d.stability, "stability", "🪨", "Stability", "Grounding"));
  box.appendChild(createMetric(d.diversityS, "diversity", "🌈", "Diversity", "Contrast"));

  const meditateVal = (d && d.areMeditative === true) ? 1 : 0;
  const balanceEl = createMetric(meditateVal, "meditate", "🧘", "Meditate", "Meditative presence");
  box.appendChild(balanceEl);

  const tilt = (fire - peace) / 20;
  balanceEl.querySelector(".icon").style.transform = `rotate(${tilt}deg)`;

  const parsed = hd?.parsed || {};
  const p1 = parsed.person1 || {};
  const p2 = parsed.person2 || {};
  const r = parsed._results || {};

  const safe = (fn) => {
    try { return fn() || []; } catch { return []; }
  };

  const gatesOnly1 = safe(() => r.uniqueGates1p1.gates);
  const gatesOnly2 = safe(() => r.uniqueGates1p2.gates);
  const sharedGates = safe(() => r.uniqueEqualGates.gates);
  const fireOnly1 = safe(() => r.exclusiveGates1p1.pairs.map(p => p.pair));
  const fireOnly2 = safe(() => r.exclusiveGates1p2.pairs.map(p => p.pair));
  const activated1 = safe(() => r.uniqueFireGates1p1.map(g => g.pair));
  const activated2 = safe(() => r.uniqueFireGates1p2.map(g => g.pair));

  const gateDescMap = {};
  try {
    (parsed.person1?.allActiveGates || []).forEach(g => { gateDescMap[g.gate] = g.description; });
    (parsed.person2?.allActiveGates || []).forEach(g => { gateDescMap[g.gate] = g.description; });
    (parsed.sharedGates?.all || []).forEach(g => { gateDescMap[g.gate] = g.description; });
  } catch (e) { }

  const centerDesc = {
    head: 'Inspiration, mental pressure',
    ajna: 'Conceptualizing, mental awareness',
    throat: 'Communication and manifestation',
    g: 'Identity, direction, love',
    solarPlexus: 'Emotional awareness and waves',
    spleen: 'Intuition, survival instincts, health',
    sacral: 'Life force and workforce energy',
    root: 'Drive, pressure, adrenaline'
  };

  function formatGateItem(v, color) {
    if (v === undefined || v === null) return `<span style='color:#999'>—</span>`;
    
    if (typeof v === 'string' && v.includes('-')) {
      const parts = v.split('-').map(s => s.trim()).filter(Boolean);
      const nums = parts.join('-');
      const query = `human design channel ${nums}`;
      const url = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
      const descCombined = parts.map(p => gateDescMap[Number(p)] || '').filter(Boolean).join(' — ');
      const ai = googleAIMode ? formatGoogleAI(descCombined, 1) : '';
      const title = ai || descCombined;
      return `<a href="${url}" target="_blank" rel="noopener noreferrer" title="${title}" style="color:${color}; text-decoration:none; font-weight:600;">${v}</a>`;
    }
    
    const n = Number(v);
    if (!Number.isFinite(n)) return `<span style='color:${color}'>${String(v)}</span>`;
    const desc = gateDescMap[n] || '';
    const ai = googleAIMode ? formatGoogleAI(desc, 1) : '';
    const title = ai || desc;
    const url = `https://www.google.com/search?q=${encodeURIComponent('human design gate ' + n)}`;
    return `<a href="${url}" target="_blank" rel="noopener noreferrer" title="${title}" style="color:${color}; text-decoration:none; font-weight:600;">${n}</a>`;
  }

  const fmt = (arr, color) =>
    (arr && arr.length)
      ? arr.map(v => formatGateItem(v, color)).join(', ')
      : "<span style='color:#999'>—</span>";

  const container = document.createElement('div');
  container.style.fontSize = '13px';
  container.style.lineHeight = '1.5em';

  const titleDiv = document.createElement('div');
  titleDiv.style.fontSize = '15px';
  titleDiv.style.fontWeight = '600';
  titleDiv.style.marginBottom = '8px';
  
  const resultAR = analyzeRelationship(fire, peace, d.growthScore, d.stability);
  titleDiv.appendChild(resultAR.pyramid);
  container.appendChild(titleDiv);

  const p1Div = document.createElement('div');
  p1Div.innerHTML = `
    <strong style="color:#1e40af">Person 1</strong><br>
    <a href="https://www.google.com/search?q=${encodeURIComponent('human design ' + p1.type)}" target="_blank" style="text-decoration:none;color:#1e40af;font-weight:700">${p1.type}</a> | 
    Profile: <a href="https://www.google.com/search?q=${encodeURIComponent('human design profile ' + p1.profile)}" target="_blank" style="text-decoration:none;color:#1e40af">${p1.profile}</a> | 
    Strategy: <a href="https://www.google.com/search?q=${encodeURIComponent('human design strategy ' + p1.strategy)}" target="_blank" style="text-decoration:none;color:#1e40af">${p1.strategy}</a> | 
    Incarnation: <a href="https://www.google.com/search?q=${encodeURIComponent('incarnation cross ' + p1.incarnationCross)}" target="_blank" style="text-decoration:none;color:#1e40af">${p1.incarnationCross}</a><br>
    Gates: [${fmt(gatesOnly1, "#1e40af")}]<br>
    Fire: [${fmt(fireOnly1, "#1e40af")}]<br>
    Activated by Person 2: [${fmt(activated1, "#1e40af")}]
  `;
  container.appendChild(p1Div);

  try {
    const p1Centers = r.person1Centers || {};
    const centersRow = document.createElement('div');
    centersRow.style.marginTop = '8px';
    centersRow.innerHTML = '<em style="font-size:12px;color:#666">Centers:</em> ' + (['head', 'ajna', 'throat', 'g', 'solarPlexus', 'spleen', 'sacral', 'root'].map(c => {
      const active = (p1Centers.activeCenters || []).includes(c);
      return `<span title="${centerDesc[c] || ''}" style="display:inline-block;margin-right:6px;padding:4px 6px;border-radius:6px;background:${active ? '#e6fffa' : '#f3f4f6'};color:${active ? '#065f46' : '#6b7280'};font-weight:600;font-size:12px;">${c}</span>`;
    }).join(' '));
    container.appendChild(centersRow);
  } catch (e) { }

  const spacer = document.createElement('div');
  spacer.style.height = '10px';
  container.appendChild(spacer);

  const p2Div = document.createElement('div');
  p2Div.innerHTML = `
    <strong style="color:#b91c1c">Person 2</strong><br>
    <a href="https://www.google.com/search?q=${encodeURIComponent('human design ' + p2.type)}" target="_blank" style="text-decoration:none;color:#b91c1c;font-weight:700">${p2.type}</a> | 
    Profile: <a href="https://www.google.com/search?q=${encodeURIComponent('human design profile ' + p2.profile)}" target="_blank" style="text-decoration:none;color:#b91c1c">${p2.profile}</a> | 
    Strategy: <a href="https://www.google.com/search?q=${encodeURIComponent('human design strategy ' + p2.strategy)}" target="_blank" style="text-decoration:none;color:#b91c1c">${p2.strategy}</a> | 
    Incarnation: <a href="https://www.google.com/search?q=${encodeURIComponent('incarnation cross ' + p2.incarnationCross)}" target="_blank" style="text-decoration:none;color:#b91c1c">${p2.incarnationCross}</a><br>
    Gates: [${fmt(gatesOnly2, "#b91c1c")}]<br>
    Fire: [${fmt(fireOnly2, "#b91c1c")}]<br>
    Activated by Person 1: [${fmt(activated2, "#b91c1c")}]
  `;
  container.appendChild(p2Div);

  try {
    const p2Centers = r.person2Centers || {};
    const centersRow2 = document.createElement('div');
    centersRow2.style.marginTop = '8px';
    centersRow2.innerHTML = '<em style="font-size:12px;color:#666">Centers:</em> ' + (['head', 'ajna', 'throat', 'g', 'solarPlexus', 'spleen', 'sacral', 'root'].map(c => {
      const active = (p2Centers.activeCenters || []).includes(c);
      return `<span title="${centerDesc[c] || ''}" style="display:inline-block;margin-right:6px;padding:4px 6px;border-radius:6px;background:${active ? '#fff7ed' : '#f3f4f6'};color:${active ? '#92400e' : '#6b7280'};font-weight:600;font-size:12px;">${c}</span>`;
    }).join(' '));
    container.appendChild(centersRow2);
  } catch (e) { }

  const spacer2 = document.createElement('div');
  spacer2.style.height = '10px';
  container.appendChild(spacer2);

  try {
    const p1CentersList = (r.person1Centers && r.person1Centers.activeCenters) || [];
    const p2CentersList = (r.person2Centers && r.person2Centers.activeCenters) || [];
    const bothCenters = p1CentersList.filter(c => p2CentersList.includes(c));

    if (bothCenters.length) {
      const bothDiv = document.createElement('div');
      bothDiv.innerHTML = '<strong>Both Active Centers</strong><br>' + (bothCenters.map(c => {
        return `<span title="${centerDesc[c] || ''}" style="display:inline-block;margin-right:6px;padding:6px 8px;border-radius:8px;background:#eef2ff;color:#1e40af;font-weight:700;font-size:12px;">${c}</span>`;
      }).join(' '));
      bothDiv.style.marginTop = '8px';
      container.appendChild(bothDiv);
    }

    const merged = r.mergedCenters || {};
    if ((merged.activeCenters && merged.activeCenters.length) || (merged.centerLinks && Object.keys(merged.centerLinks || {}).length)) {
      const mdiv = document.createElement('div');
      mdiv.style.marginTop = '8px';
      mdiv.innerHTML = '<strong>Merged Centers</strong><br>' + ((merged.activeCenters || []).map(c => {
        return `<span title="${centerDesc[c] || ''}" style="display:inline-block;margin-right:6px;padding:6px 8px;border-radius:8px;background:#f0f9ff;color:#034155;font-weight:700;font-size:12px;">${c}</span>`;
      }).join(' ') || '<span style="color:#999">—</span>');
      container.appendChild(mdiv);
    }
  } catch (e) { }

  const sharedDiv = document.createElement('div');
  sharedDiv.innerHTML = `<strong>Shared Gates</strong><br>[${fmt(sharedGates, 'green')}]`;
  container.appendChild(sharedDiv);

  summary.innerHTML = '';
  summary.appendChild(container);

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      finalizeAnalysisUI();
    });
  });
});

loadRanges();

</script>

</body>
</html>
