<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HD Visual</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: system-ui, sans-serif;
  margin: 40px;
  background: linear-gradient(180deg,#f8fafc,#eef2ff);
}

/* subtle energy pulse */
body::before {
  content:"";
  position:fixed;
  inset:0;
  background: radial-gradient(circle, rgba(99,102,241,0.15), transparent 70%);
  animation:pulse 6s infinite alternate;
  z-index:-1;
}
@keyframes pulse { from {opacity:0.3;} to {opacity:0.6;} }

/* FORM */
form {
  background:white;
  padding:20px;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

label { display:block; margin-top:10px; }
input { padding:6px; border-radius:6px; border:1px solid #ccc; }

button {
  margin-top:10px;
  padding:8px 14px;
  border-radius:8px;
  border:none;
  background:#4f46e5;
  color:white;
  cursor:pointer;
}
button:hover { background:#3730a3; }

/* SUMMARY */
.summary { display:none; margin-top:15px; padding:12px; background:#eef2ff; border-radius:10px; }
.summary-toggle { margin-top:10px; cursor:pointer; color:#4f46e5; font-weight:600; }

/* GRID */
.visual-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:20px;
  margin-top:30px;
}

/* CARD */
.metric {
  background:white;
  border-radius:16px;
  padding:15px;
  text-align:center;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

/* ICON BOX */
.icon-box {
  position:relative;
  width:60px;
  height:120px;
  margin:10px auto;
  background:#e5e7eb;
  border-radius:30px;
  overflow:hidden;
}

.fill {
  position:absolute;
  bottom:0;
  width:100%;
  height:0%;
  opacity:0.85;
  transition:height 0.8s ease;
}

/* COLORS */
.fire { background:linear-gradient(#ffd633,#ff9900); }
.peace { background:linear-gradient(#66cc66,#2f855a); }
.growth { background:linear-gradient(#999,#555); }
.stability { background:linear-gradient(#cc9966,#8b5a2b); }
.diversity { background:linear-gradient(#ff4d4d,#b91c1c); }
.avg { background:linear-gradient(#6633cc,#4338ca); }

/* ICONS */
.icon { font-size:26px; }

/* animations */
.fire-icon { animation:flicker 0.6s infinite alternate; }
@keyframes flicker { from{transform:scale(1);} to{transform:scale(1.1);} }

.peace-icon::after {
  content:"";
  display:block;
  width:6px;
  height:12px;
  margin:0 auto;
  background:rgba(255,255,255,0.7);
  border-radius:50%;
  animation:steam 1.5s infinite;
}
@keyframes steam { from{transform:translateY(0);} to{transform:translateY(-10px);opacity:0;} }

.growth-icon { animation:grow 1.5s infinite alternate; }
@keyframes grow { from{transform:translateY(2px);} to{transform:translateY(-4px);} }

.balance-icon { transition: transform 0.5s ease; }

.value { font-weight:600; }
.label { font-size:12px; color:#666; }
</style>
</head>

<body>

<h1>HD Visual</h1>

<form id="calcForm">

<label>
City 1:
<input type="text" id="city1">
<button type="button" id="fillCoords1">Fill</button>
</label>

<label>Lat 1 <input type="number" name="lat1" value="46.0500268"></label>
<label>Lon 1 <input type="number" name="lon1" value="14.5069289"></label>
<label>Date 1 <input type="datetime-local" name="dt1" value="1984-02-16T12:00"></label>

<hr>

<label>
City 2:
<input type="text" id="city2">
<button type="button" id="fillCoords2">Fill</button>
</label>

<label>Lat 2 <input type="number" name="lat2" value="46.0500268"></label>
<label>Lon 2 <input type="number" name="lon2" value="14.5069289"></label>
<label>Date 2 <input type="datetime-local" name="dt2" value="1985-10-03T12:00"></label>

<button type="submit">Analyze</button>

<div class="summary-toggle" id="toggleSummary">▼ Insights</div>
<div class="summary" id="summary"></div>

</form>

<div class="visual-grid" id="visuals"></div>

<script>
let ranges = {};

async function loadRanges(){
  try {
    const res = await fetch("/2025-11-15T14-19-25-534Z-pair-time.json");
    if (!res.ok) throw new Error('range file not found');
    const json = await res.json();
    const data = (json.scores||[]).map(e=>e.score||{});

    ["fire","peace","growth","stability","diversity"].forEach(f=>{
      const vals=data.map(x=>Number(x[f])||0).filter(v=>!Number.isNaN(v));
      if (vals.length) {
        ranges[f]={min:Math.min(...vals),max:Math.max(...vals)};
      }
    });
  } catch (err) {
    console.warn('Could not load ranges file, using defaults:', err && err.message);
    // provide safe defaults so norm() won't throw
    ["fire","peace","growth","stability","diversity"].forEach(f=>{
      ranges[f] = { min: 0, max: 10 };
    });
  }
}

function norm(v,f){
  try {
    if (!ranges || !ranges[f]) {
      // ranges not loaded yet — return neutral 0.5
      return 0.5;
    }
    const {min=0,max=0}=ranges[f]||{};
    const num = Number(v);
    if (!isFinite(num)) return 0.5;
    if (max === min) return 0.5;
    return (num - min) / (max - min);
  } catch (err) {
    console.warn('norm error', err);
    return 0.5;
  }
}

/* CITY */
async function getCoords(city){
  const res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${city}`);
  const d=await res.json();
  if(d[0]) return {lat:d[0].lat,lon:d[0].lon};
}

fillCoords1.onclick=async()=>{
  const c=await getCoords(city1.value);
  if(c){
    document.querySelector('[name=lat1]').value=c.lat;
    document.querySelector('[name=lon1]').value=c.lon;
  }
};

fillCoords2.onclick=async()=>{
  const c=await getCoords(city2.value);
  if(c){
    document.querySelector('[name=lat2]').value=c.lat;
    document.querySelector('[name=lon2]').value=c.lon;
  }
};

/* METRIC */
function createMetric(val,key,icon,label,desc){
  const p=norm(val,key);

  let iconClass="";
  if(key==="fire") iconClass="fire-icon";
  if(key==="peace") iconClass="peace-icon";
  if(key==="growth") iconClass="growth-icon";
  if(key==="avg") iconClass="balance-icon";

  const div=document.createElement("div");
  div.className="metric";
  div.title=desc;

  div.innerHTML=`
    <div class="icon ${iconClass}">${icon}</div>
    <div class="icon-box">
      <div class="fill ${key}" style="height:${p*100}%"></div>
    </div>
    <div class="value">${(p*100).toFixed(0)}%</div>
    <div class="label">${label}</div>
  `;

  return div;
}

/* REL TYPE */
function getRelationshipType(fire,peace,growth,stability){
  if(fire>7 && peace<4) return "🔥 Intense";
  if(peace>7 && fire<4) return "🌿 Calm";
  if(fire>6 && peace>6) return "⚡ Powerful";
  if(stability<3) return "🌪 Volatile";
  if(growth>7) return "🌱 Growth";
  return "⚖️ Balanced";
}

/* SUBMIT */
calcForm.addEventListener("submit",async e=>{
  e.preventDefault();

  const obj=Object.fromEntries(new FormData(e.target).entries());

  const res=await fetch("/run",{
    method:"POST",
    headers:{ "Content-Type":"application/json","x-api-key":"my-secret-key"},
    body:JSON.stringify(obj)
  });

  const hd=await res.json();
  const d=hd.data||hd;

  const box=visuals;
  box.innerHTML="";

  const fire=d.fireScore;
  const peace=d.peaceScore;
  const avg=(fire+peace)/2;

  box.appendChild(createMetric(fire,"fire","🔥","Fire","Attraction"));
  box.appendChild(createMetric(peace,"peace","🍵","Peace","Harmony"));
  box.appendChild(createMetric(d.growthScore,"growth","🌱","Growth","Expansion"));
  box.appendChild(createMetric(d.stability,"stability","🪨","Stability","Grounding"));
  box.appendChild(createMetric(d.diversityS,"diversity","🌈","Diversity","Contrast"));
  const balanceEl=createMetric(avg,"avg","⚖️","Balance","Fire vs Peace");
  box.appendChild(balanceEl);

  const tilt=(fire-peace)/20;
  balanceEl.querySelector(".icon").style.transform=`rotate(${tilt}deg)`;

  /* SAFE INSIGHTS */
  /* 🔥 FULL SAFE INSIGHTS (COMPLETE + NEVER EMPTY) */
/* SAFE INSIGHTS (FULL RESTORE) */
const parsed = hd?.parsed || {};
const p1 = parsed.person1 || {};
const p2 = parsed.person2 || {};
const r = parsed._results || {};

const safe = (fn) => {
  try { return fn() || []; } catch { return []; }
};

// 🔹 EXTRACT EVERYTHING (this was missing)
const gatesOnly1 = safe(()=>r.uniqueGates1p1.gates);
const gatesOnly2 = safe(()=>r.uniqueGates1p2.gates);

const sharedGates = safe(()=>r.uniqueEqualGates.gates);

const fireOnly1 = safe(()=>r.exclusiveGates1p1.pairs.map(p=>p.pair));
const fireOnly2 = safe(()=>r.exclusiveGates1p2.pairs.map(p=>p.pair));

const activated1 = safe(()=>r.uniqueFireGates1p1.map(g=>g.pair));
const activated2 = safe(()=>r.uniqueFireGates1p2.map(g=>g.pair));

// 🔹 BUILD GATE DESCRIPTION MAP + CENTER DESCRIPTIONS
const gateDescMap = {};
try {
  (parsed.person1?.allActiveGates||[]).forEach(g=>{ gateDescMap[g.gate]=g.description; });
  (parsed.person2?.allActiveGates||[]).forEach(g=>{ gateDescMap[g.gate]=g.description; });
  (parsed.sharedGates?.all||[]).forEach(g=>{ gateDescMap[g.gate]=g.description; });
} catch(e) { /* ignore */ }

const centerDesc = {
  head: 'Inspiration, mental pressure',
  ajna: 'Conceptualizing, mental awareness',
  throat: 'Communication and manifestation',
  g: 'Identity, direction, love',
  solarPlexus: 'Emotional awareness and waves',
  spleen: 'Intuition, survival instincts, health',
  sacral: 'Life force and workforce energy',
  root: 'Drive, pressure, adrenaline'
};

// 🔹 FORMAT (interactive gate links + hover descriptions)
function formatGateItem(v, color){
  if (v === undefined || v === null) return `<span style='color:#999'>—</span>`;
  // pairs like "12-22"
  if (typeof v === 'string' && v.includes('-')){
    return v.split('-').map(x=>formatGateItem(Number(x), color)).join('-');
  }
  const n = Number(v);
  if (!Number.isFinite(n)) return `<span style='color:${color}'>${String(v)}</span>`;
  const desc = gateDescMap[n] || '';
  const url = `https://humdes.com/gate/${n}`;
  return `<a href="${url}" target="_blank" rel="noopener noreferrer" title="${desc}" style="color:${color}; text-decoration:none; font-weight:600;">${n}</a>`;
}

const fmt = (arr,color) =>
  (arr && arr.length)
    ? arr.map(v=>formatGateItem(v,color)).join(', ')
    : "<span style='color:#999'>—</span>";

// 🔹 RENDER (FULL DATA) - build DOM so it's robust and always visible
const container = document.createElement('div');
container.style.fontSize = '13px';
container.style.lineHeight = '1.5em';

const titleDiv = document.createElement('div');
titleDiv.style.fontSize = '15px';
titleDiv.style.fontWeight = '600';
titleDiv.style.marginBottom = '8px';
titleDiv.textContent = getRelationshipType(fire,peace,d.growthScore,d.stability);
container.appendChild(titleDiv);

const p1Div = document.createElement('div');
// show type, profile, strategy, incarnation cross
p1Div.innerHTML = `
  <strong style="color:#1e40af">Person 1</strong><br>
  ${p1.type||"—"} | ${p1.profile||"—"} | Strategy: ${p1.strategy||'—'} | Incarnation: ${p1.incarnationCross||'—'}<br>
  Gates: [${fmt(gatesOnly1,"#1e40af")} ]<br>
  Fire: [${fmt(fireOnly1,"#1e40af")} ]<br>
  Activated by Person 2: [${fmt(activated1,"#1e40af")} ]
`;
container.appendChild(p1Div);

// centers for person 1
try{
  const p1Centers = r.person1Centers || {};
  const centersRow = document.createElement('div');
  centersRow.style.marginTop='8px';
  centersRow.innerHTML = '<em style="font-size:12px;color:#666">Centers:</em> ' + (['head','ajna','throat','g','solarPlexus','spleen','sacral','root'].map(c=>{
    const active = (p1Centers.activeCenters||[]).includes(c);
    return `<span title="${centerDesc[c]||''}" style="display:inline-block;margin-right:6px;padding:4px 6px;border-radius:6px;background:${active? '#e6fffa':'#f3f4f6'};color:${active? '#065f46':'#6b7280'};font-weight:600;font-size:12px;">${c}</span>`;
  }).join(' '));
  container.appendChild(centersRow);
}catch(e){}

const spacer = document.createElement('div'); spacer.style.height = '10px'; container.appendChild(spacer);

const p2Div = document.createElement('div');
p2Div.innerHTML = `
  <strong style="color:#b91c1c">Person 2</strong><br>
  ${p2.type||"—"} | ${p2.profile||"—"} | Strategy: ${p2.strategy||'—'} | Incarnation: ${p2.incarnationCross||'—'}<br>
  Gates: [${fmt(gatesOnly2,"#b91c1c")} ]<br>
  Fire: [${fmt(fireOnly2,"#b91c1c")} ]<br>
  Activated by Person 1: [${fmt(activated2,"#b91c1c")} ]
`;
container.appendChild(p2Div);

// centers for person 2
try{
  const p2Centers = r.person2Centers || {};
  const centersRow2 = document.createElement('div');
  centersRow2.style.marginTop='8px';
  centersRow2.innerHTML = '<em style="font-size:12px;color:#666">Centers:</em> ' + (['head','ajna','throat','g','solarPlexus','spleen','sacral','root'].map(c=>{
    const active = (p2Centers.activeCenters||[]).includes(c);
    return `<span title="${centerDesc[c]||''}" style="display:inline-block;margin-right:6px;padding:4px 6px;border-radius:6px;background:${active? '#fff7ed':'#f3f4f6'};color:${active? '#92400e':'#6b7280'};font-weight:600;font-size:12px;">${c}</span>`;
  }).join(' '));
  container.appendChild(centersRow2);
}catch(e){}

const spacer2 = document.createElement('div'); spacer2.style.height = '10px'; container.appendChild(spacer2);

const sharedDiv = document.createElement('div');
sharedDiv.innerHTML = `<strong>Shared Gates</strong><br>[${fmt(sharedGates,'green')}]`;
container.appendChild(sharedDiv);

// inject
summary.innerHTML = '';
summary.appendChild(container);
// ensure the Insights panel is visible after a run
try {
  summary.style.display = 'block';
  if (toggleSummary && toggleSummary.textContent) toggleSummary.textContent = '▲ Insights';
  // add a small scroll so user sees the panels
  summary.scrollIntoView({ behavior: 'smooth', block: 'start' });
} catch (e) { /* ignore */ }

// Add collapsible panels showing the full hd JSON and the parsed._results for easy inspection
try {
  const detailsFull = document.createElement('details');
  detailsFull.style.marginTop = '12px';
  const sumFull = document.createElement('summary');
  sumFull.style.cursor = 'pointer'; sumFull.style.fontWeight = '600';
  sumFull.textContent = 'Full hd JSON (hd)';
  const preFull = document.createElement('pre');
  preFull.style.maxHeight = '320px'; preFull.style.overflow = 'auto';
  preFull.style.background = '#f7f7f9'; preFull.style.padding = '8px'; preFull.style.borderRadius = '6px';
  preFull.textContent = JSON.stringify(hd, null, 2);
  detailsFull.appendChild(sumFull);
  detailsFull.appendChild(preFull);
  summary.appendChild(detailsFull);

  const detailsResults = document.createElement('details');
  detailsResults.style.marginTop = '8px';
  const sumRes = document.createElement('summary');
  sumRes.style.cursor = 'pointer'; sumRes.style.fontWeight = '600';
  sumRes.textContent = 'Parsed._results';
  const preRes = document.createElement('pre');
  preRes.style.maxHeight = '420px'; preRes.style.overflow = 'auto';
  preRes.style.background = '#f7f7f9'; preRes.style.padding = '8px'; preRes.style.borderRadius = '6px';
  preRes.textContent = JSON.stringify(r, null, 2);
  detailsResults.appendChild(sumRes);
  detailsResults.appendChild(preRes);
  summary.appendChild(detailsResults);
} catch (err) {
  console.error('Error creating debug panels:', err);
}

 // summary.innerHTML=html;
});

toggleSummary.onclick=()=>{
  summary.style.display=summary.style.display==="none"?"block":"none";
};

loadRanges();
</script>

</body>
</html>
